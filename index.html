<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Audio Stream</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:20px;
    font-family:Arial;
}
audio{
    width:100%;
}
</style>

</head>
<body>

<audio id="audio" controls autoplay muted></audio>

<script>

const url = "https://contact.gostreaming.tv/Con-9/tracks-v3a1/mono.ts.m3u8";

const audio = document.getElementById("audio");

function connect(){

    if(Hls.isSupported()){

        const hls = new Hls({
            liveSyncDurationCount:3
        });

        hls.loadSource(url);

        hls.attachMedia(audio);

        hls.on(Hls.Events.MANIFEST_PARSED,function(){
            audio.play().catch(()=>{});
        });

        hls.on(Hls.Events.ERROR,function(event,data){

            if(data.fatal){

                hls.destroy();

                setTimeout(connect,3000);

            }

        });

    }else{

        audio.src=url;

        audio.play().catch(()=>{});

    }

}

connect();

</script>

</body>
</html>
