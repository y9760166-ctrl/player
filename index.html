<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
    margin:0;
    height:100%;
    background:#000;
}

video{
    width:100%;
    height:100vh;
    background:#000;
}
</style>
</head>

<body>

<video id="player" controls autoplay muted playsinline></video>

<script>

const STREAM_URL = "https://contact.gostreaming.tv/Con-9/tracks-v3a1/mono.ts.m3u8";
const FALLBACK = "silence.mp3";

const video = document.getElementById("player");

video.muted = true;
video.autoplay = true;
video.playsInline = true;

let hls = null;
let usingFallback = false;
let checking = false;

function destroyHls(){
    if(hls){
        hls.destroy();
        hls = null;
    }
}

function safePlay(){
    video.play().catch(() => {});
}

function playFallback(){
    destroyHls();

    if(usingFallback) return;
    usingFallback = true;

    video.src = FALLBACK;
    video.loop = true;
    video.muted = true;

    video.load();
    safePlay();
}

function playStream(){
    destroyHls();

    if(Hls.isSupported()){

        hls = new Hls({
            liveSyncDurationCount: 3
        });

        hls.loadSource(STREAM_URL);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function(){
            usingFallback = false;
            video.loop = false;
            video.muted = true;
            video.load();
            safePlay();
        });

        hls.on(Hls.Events.ERROR, function(event, data){
            if(data.fatal){
                playFallback();
            }
        });

    } else {

        video.src = STREAM_URL;
        video.loop = false;
        video.muted = true;
        video.load();
        safePlay();
    }
}

video.addEventListener("canplay", safePlay);

playStream();

setInterval(() => {

    if(checking) return;
    checking = true;

    fetch(STREAM_URL, { method: "HEAD", cache: "no-store" })
        .then(res => {
            if(res.ok){
                if(usingFallback) playStream();
            } else {
                if(!usingFallback) playFallback();
            }
        })
        .catch(() => {
            if(!usingFallback) playFallback();
        })
        .finally(() => {
            checking = false;
        });

}, 10000);

</script>

</body>
</html>
