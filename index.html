<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<video
id="video"
controls
autoplay
style="width:100%;">
</video>

<script>

var video = document.getElementById('video');

var url = "https://contact.gostreaming.tv/Con-9/tracks-v3a1/mono.ts.m3u8";

if(Hls.isSupported()){

var hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else{

video.src = url;

}

</script>

</body>
</html>
